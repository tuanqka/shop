<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chốt Đơn Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header id="app-header">
    <span class="logo">⚡ Chốt Đơn</span>
    <div class="stats-row">
      <span class="stat-item">Đơn: <strong id="total-orders">0</strong></span>
      <span class="stat-item">DT: <strong id="total-revenue">0đ</strong></span>
      <span class="stat-item">Mẫu: <strong id="total-models">0</strong></span>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" id="btn-add-model" onclick="openAddModelModal()">+ Mẫu</button>
      <button class="btn btn-red" id="btn-reset-all" onclick="resetAll()">Reset</button>
    </div>
  </header>

  <main id="app-main">
    <div id="product-list"></div>

    <div id="empty-state" class="empty-state">
      <div class="empty-icon">📦</div>
      <h2>Chưa có mẫu nào</h2>
      <p>Bấm <strong>"+ Mẫu"</strong> để bắt đầu</p>
    </div>
  </main>

  <!-- Modal: Thêm Mẫu -->
  <div class="modal-overlay" id="modal-add-model">
    <div class="modal">
      <div class="modal-header">
        <h2>Thêm Mẫu</h2>
        <button class="modal-close" onclick="closeModal('modal-add-model')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Tên mẫu</label>
          <input type="text" id="input-model-name" placeholder="A1, B2...">
        </div>
        <div class="form-group">
          <label>Giá (VNĐ)</label>
          <input type="number" id="input-model-price" placeholder="120000" min="0">
        </div>
        <div class="form-group">
          <label>Màu đầu tiên</label>
          <input type="text" id="input-model-color" placeholder="Đen, Trắng...">
        </div>
        <div class="form-group">
          <label>Số lượng tồn</label>
          <input type="number" id="input-model-stock" placeholder="200" min="0">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('modal-add-model')">Hủy</button>
        <button class="btn btn-primary" onclick="addModel()">Thêm</button>
      </div>
    </div>
  </div>

  <!-- Modal: Thêm Màu -->
  <div class="modal-overlay" id="modal-add-color">
    <div class="modal">
      <div class="modal-header">
        <h2>Thêm Màu</h2>
        <button class="modal-close" onclick="closeModal('modal-add-color')">&times;</button>
      </div>
      <div class="modal-body">
        <p class="modal-info">Mẫu: <strong id="add-color-model-name"></strong></p>
        <div class="form-group">
          <label>Tên màu</label>
          <input type="text" id="input-color-name" placeholder="Xanh, Đỏ...">
        </div>
        <div class="form-group">
          <label>Số lượng tồn</label>
          <input type="number" id="input-color-stock" placeholder="200" min="0">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('modal-add-color')">Hủy</button>
        <button class="btn btn-primary" onclick="addColor()">Thêm</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
